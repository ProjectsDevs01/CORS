<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flooring Form</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 class="mt-4">Add Flooring</h2>
        <form id="flooringForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" class="form-control" id="title" name="title" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="sizeOfFloor">Size of Floor:</label>
                <input type="text" class="form-control" id="sizeOfFloor" name="sizeOfFloor">
            </div>
            <div class="form-group">
                <label for="numberOfSqft">Number of Sqft:</label>
                <input type="text" class="form-control" id="numberOfSqft" name="numberOfSqft">
            </div>
            <div class="form-group">
                <label for="catalogCodeAndNumber">Catalog Code and Number:</label>
                <input type="text" class="form-control" id="catalogCodeAndNumber" name="catalogCodeAndNumber">
            </div>
            <div class="form-group">
                <label for="file">Image:</label>
                <input type="file" class="form-control" id="file" name="flooringImage" accept="image/*" required>
            </div>
            <div class="form-group">
                <label for="customerName">Customer Name:</label>
                <input type="text" class="form-control" id="customerName" name="customerName">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
    <h2>Get Flooring</h2>
    <form id="getFlooringForm">
        <label for="flooringId">Enter Flooring ID:</label><br>
        <input type="text" id="flooringId" name="flooringId" required><br>
        <button type="button" onclick="getFlooring()">Get Flooring</button>
    </form>

    <div id="flooringResult"></div>

    <script>
        async function getFlooring() {
            const flooringId = document.getElementById('flooringId').value;
            try {
                const response = await fetch(`http://3.106.227.95:8888/api/products/floorings/${flooringId}`, {
                    headers: {
                        'Authorization': 'Basic ' + btoa('abinesh:abi')
                    }
                });
                if (!response.ok) {
                    throw new Error('Failed to fetch flooring');
                }
                const data = await response.json();
                const flooringResultDiv = document.getElementById('flooringResult');
                flooringResultDiv.innerHTML = `<h3>Flooring Details</h3>
                    <p>Title: ${data.title}</p>
                    <p>Description: ${data.description}</p>
                    <p>Size of Floor: ${data.sizeOfFloor}</p>
                    <p>Number of Sqft: ${data.numberOfSqft}</p>
                    <p>Catalog Code and Number: ${data.catalogCodeAndNumber}</p>
                    <p>Customer Name: ${data.customerName}</p>
                    <img src="data:image/jpeg;base64,${data.flooringImage}" alt="Flooring Image" style="max-width: 100%; max-height: 100%"/>`;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        document.getElementById('flooringForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const formData = new FormData(this);
            try {
                const response = await fetch('http://3.106.227.95:8888/api/products/floorings', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Authorization': 'Basic ' + btoa('abinesh:abi')
                    }
                });
                if (!response.ok) {
                    throw new Error('Failed to save flooring');
                }
                const data = await response.json();
                alert('Flooring saved successfully!');
                event.target.reset();
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>

</html>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
